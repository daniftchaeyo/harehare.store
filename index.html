<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARE HARE STREET</title>
<style>
body {margin:0;font-family:Arial;background:#0b0b0b;color:#fff;}
.nav{display:flex;justify-content:space-between;padding:20px;border-bottom:1px solid #222;}
.logo{font-weight:900;letter-spacing:3px;}
.hero{height:90vh;background:url('https://images.unsplash.com/photo-1523398002811-999ca8dec234?q=80&w=1200') center/cover;display:flex;align-items:center;padding:40px;}
.hero h1{font-size:60px;max-width:500px;}
.btn{background:#fff;color:#000;padding:12px 20px;border:none;cursor:pointer;margin-top:20px;}
.section{padding:40px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.card{background:#111;border:1px solid #222;padding:10px;}
.card img{width:100%;}
.price{font-weight:bold;}
footer{padding:30px;border-top:1px solid #222;text-align:center;color:#aaa;}
@media(max-width:800px){.grid{grid-template-columns:1fr 1fr}.hero h1{font-size:40px}}
  .logo img {
  height: 60px;
}
</style>
</head>
<body>

<div class="nav">
<div class="logo">
  <img src="logo.png" alt="Hare Hare Logo">
</div>
<div>Shop · Drops · Street</div>
</div>

<div class="hero">
<div>
<h1>STREETWEAR THAT HITS DIFFERENT</h1>
<button class="btn">SHOP NOW</button>
</div>
</div>

<div class="section">
<h2>NEW DROP</h2>
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38?q=80&w=800">
<p>Oversize Hoodie</p>
<p class="price">$899</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1544441893-675973e31985?q=80&w=800">
<p>Street Jacket</p>
<p class="price">$1299</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=800">
<p>Baggy Pants</p>
<p class="price">$999</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1516826957135-700dedea698c?q=80&w=800">
<p>Graphic Tee</p>
<p class="price">$499</p>
</div>

</div>
</div>

<footer>
HARE HARE STREET · 2026
</footer>

</body>
</html>
