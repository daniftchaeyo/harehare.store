<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HareHare Streetwear</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #fff;
}

/* Botón hamburguesa */
.hamburger {
    font-size: 30px;
    cursor: pointer;
    padding: 10px;
}

/* Panel lateral */
#sidePanel {
    height: 100%;
    width: 0;
    position: fixed;
    z-index: 1000;
    top: 0;
    left: 0;
    background-color: #111;
    overflow-x: hidden;
    transition: 0.3s;
    padding-top: 60px;
}

#sidePanel a {
    padding: 10px 30px;
    text-decoration: none;
    font-size: 18px;
    color: #fff;
    display: block;
    transition: 0.3s;
}

#sidePanel a:hover {
    background-color: #575757;
}

#sidePanel .closeBtn {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 30px;
}

/* Contenedor principal */
.main-content {
    padding: 20px;
}

/* Botón flotante carrito */
#cartBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 20px;
    padding: 15px;
    border: none;
    border-radius: 50%;
    background-color: #00C851;
    color: #fff;
    cursor: pointer;
    z-index: 1001;
}

</style>
</head>
<body>

<!-- Botón hamburguesa -->
<span class="hamburger" onclick="openNav()">&#9776;</span>

<!-- Panel lateral -->
<div id="sidePanel">
    <a href="javascript:void(0)" class="closeBtn" onclick="closeNav()">&times;</a>
    <a href="#">Inicio</a>
    <a href="#">New Drop</a>
    <a href="#">Hombre</a>
    <a href="#">Mujer</a>
    <a href="#">Unisex</a>
    <a href="#">Ofertas</a>
    <a href="#">Tallas</a>
    <a href="#" onclick="openCart()">Carrito</a>
</div>

<div class="main-content">
    <h1>HareHare Streetwear</h1>
    <p>Tu tienda de ropa urbana online.</p>
</div>

<!-- Botón flotante carrito -->
<button id="cartBtn" onclick="openCart()">🛒</button>

<!-- Carrito simulado -->
<div id="cartPanel" style="display:none; position:fixed; top:0; right:0; width:300px; height:100%; background:#eee; z-index:1002; padding:20px; overflow-y:auto;">
    <h2>Carrito</h2>
    <ul id="cartItems"></ul>
    <button onclick="checkout()">Checkout</button>
    <button onclick="closeCart()">Cerrar</button>
</div>

<script>
function openNav() {
    document.getElementById("sidePanel").style.width = "250px";
}
function closeNav() {
    document.getElementById("sidePanel").style.width = "0";
}
function openCart() {
    document.getElementById("cartPanel").style.display = "block";
}
function closeCart() {
    document.getElementById("cartPanel").style.display = "none";
}

// Simulación de carrito
let cart = [];
function addToCart(item) {
    cart.push(item);
    updateCart();
}
function updateCart() {
    const list = document.getElementById("cartItems");
    list.innerHTML = "";
    cart.forEach((i, index) => {
        const li = document.createElement("li");
        li.textContent = i + " ";
        const removeBtn = document.createElement("button");
        removeBtn.textContent = "Eliminar";
        removeBtn.onclick = () => { cart.splice(index, 1); updateCart(); };
        li.appendChild(removeBtn);
        list.appendChild(li);
    });
}
function checkout() {
    if(cart.length > 0) {
        alert("Total: " + cart.length + " items. Gracias por tu compra!");
        cart = [];
        updateCart();
        closeCart();
    } else {
        alert("Tu carrito está vacío.");
    }
}
</script>

</body>
</html>
